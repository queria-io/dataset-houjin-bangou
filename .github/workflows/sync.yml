name: Sync

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
  schedule:
    - cron: "0 19 1 * *" # 毎月1日 04:00 JST
  workflow_dispatch:

# 日次差分(sync-daily.yml)と同一テーブルを書き換えるため group を揃えて直列化する
concurrency:
  group: houjin-build
  cancel-in-progress: false

jobs:
  sync:
    uses: flo8s/dataset-shared/.github/workflows/sync.yml@main
    with:
      dataset_name: houjin_bangou
      s3_bucket: ${{ vars.S3_BUCKET }}
    secrets: inherit
